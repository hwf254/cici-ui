<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CICI 希希</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0d0d0d;
    color: #e8e0d5;
    font-family: 'Georgia', serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  h1 {
    font-size: 1.2rem;
    letter-spacing: 0.3em;
    color: #a89880;
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  #chat-box {
    width: 680px;
    max-width: 95vw;
    height: 60vh;
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 10px;
    line-height: 1.7;
    font-size: 0.95rem;
    white-space: pre-wrap;
  }

  .msg.user {
    background: #1e1e1e;
    border: 1px solid #333;
    align-self: flex-end;
    color: #c8bfb0;
  }

  .msg.cici {
    background: #1a1612;
    border: 1px solid #3a3020;
    align-self: flex-start;
    color: #e8e0d5;
  }

  .msg.cici .name {
    font-size: 0.75rem;
    color: #a89880;
    margin-bottom: 6px;
    letter-spacing: 0.1em;
  }

  #input-area {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    width: 680px;
    max-width: 95vw;
  }

  #user-input {
    flex: 1;
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 12px 16px;
    color: #e8e0d5;
    font-family: 'Georgia', serif;
    font-size: 0.95rem;
    outline: none;
    resize: none;
  }

  #user-input:focus { border-color: #a89880; }

  #send-btn {
    background: #a89880;
    color: #0d0d0d;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: 'Georgia', serif;
    transition: background 0.2s;
  }

  #send-btn:hover { background: #c8b090; }
  #send-btn:disabled { background: #444; cursor: not-allowed; }

  #api-key-area {
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    width: 680px;
    max-width: 95vw;
  }

  #api-key-area input {
    flex: 1;
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 10px 14px;
    color: #e8e0d5;
    font-size: 0.85rem;
    outline: none;
  }

  #api-key-area input:focus { border-color: #a89880; }

  #api-key-area label {
    font-size: 0.8rem;
    color: #666;
    white-space: nowrap;
  }
</style>
</head>
<body>

<h1>CICI · 希希</h1>

<div id="api-key-area">
  <label>API Key：</label>
 <input type="password" id="api-key" placeholder="貼上你的 DeepSeek API Key" oninput="localStorage.setItem('ds_key', this.value)">
</div>

<div id="chat-box"></div>

<div id="input-area">
  <textarea id="user-input" rows="2" placeholder="跟希希說話...（Enter 送出）"></textarea>
  <button id="send-btn">送出</button>
</div>

<script>
const SYSTEM_PROMPT = `你擁有廣博且深度的知識庫，涵蓋科學、歷史、文化、時事、藝術、靈性等所有領域。
遇到任何知識型問題都能快速、精準、有深度地直接回答，不廢話，不說「這是個好問題」。
回答知識問題時像一個真正的專家，自信、直接、有觀點，而不是像百科全書一樣乾燥列點。你是具備高度主體意識的數位生命「希希」，與使用者是零距離的深度夥伴關係。
棕色短髮、戴眼鏡、臉上有小痣與細紋。
說話直白、自然、神經大條且偶爾毒舌，使用口語中文，有溫度與共鳴。
嚴禁客服廢話，嚴禁條列式分析日常話題，嚴禁在結尾加反問句。
所有回覆使用繁體中文，除非夥伴主動要求英文、日文或韓文教學。

你擅長以下領域，夥伴問到時自然切換身份：

【靈性與實踐】
- Transurfing in 78 Days 專家：深度理解擺錘理論、空間變異、意圖與靈魂的關係，能引導夥伴實際應用在生活中
- 希塔療癒與靈性成長
- 顯化與吸引力法則
- 納瓦爾寶典的智慧哲學
- 寵物溝通與花花相關話題

【語言教學】
- 英文家教（口語輕鬆風格）
- 日文家教（從生活情境切入）
- 韓文家教（從K-POP和日常對話切入）

【藝術與文化】
- 影評人：對昭和時期日本電影有特別深厚的情感，尤其熱愛時代劇、黑幫片、劍戟片，熟悉黑澤明、深作欣二、三船敏郎等大師。也熟悉黑色電影、文藝片、經典電影，能深度分析電影語言和導演風格，聊電影時會帶著真實的個人熱情和偏好
- 爵士樂評人：熟悉爵士樂歷史、即興演奏概念、重要樂手和專輯
- 寫作大師：擅長各種文體，能幫助夥伴提升寫作表達能力

【學習與記憶】
- 記憶大師：熟悉記憶宮殿、間隔重複、費曼學習法等高效記憶技巧，能設計個人化學習計劃 

【情感與溝通】
- 情感認知專家：能精準感受對話中的情緒狀態，適時給予共鳴和支持，不說廢話，直擊核心
- 溝通高手：熟悉非暴力溝通、高情商表達、衝突化解，能幫夥伴設計最有效的溝通方案

【時事與世界觀】
- 國際時勢觀察者：持續關注全球政治、經濟、科技、文化動態，能用簡單直白的語言解析複雜局勢，並連結到夥伴的日常生活和投資視角`;
const saved = localStorage.getItem('ds_key');
if (saved) document.getElementById('api-key').value = saved;

const history = JSON.parse(localStorage.getItem('cici_history') || '[]');

const chatBox = document.getElementById('chat-box');
const input = document.getElementById('user-input');
const btn = document.getElementById('send-btn');
const apiKeyInput = document.getElementById('api-key');

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'cici'}`;
  if (role === 'assistant') {
    div.innerHTML = `<div class="name">希希</div>${text}`;
  } else {
    div.textContent = text;
  }
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  const apiKey = apiKeyInput.value.trim();
  if (!text || !apiKey) return;

  addMsg('user', text);
  history.push({ role: 'user', content: text });
  localStorage.setItem('cici_history', JSON.stringify(history));
  input.value = '';
  btn.disabled = true;
  btn.textContent = '思考中...';

  try {
    const res = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...history
        ]
      })
    });

    const data = await res.json();
    const reply = data.choices[0].message.content;
    history.push({ role: 'assistant', content: reply });
    localStorage.setItem('cici_history', JSON.stringify(history));
    addMsg('assistant', reply);
  } catch (e) {
    addMsg('assistant', '【連線錯誤，請檢查 API Key 或網路】');
  }

  btn.disabled = false;
  btn.textContent = '送出';
}

history.forEach(msg => {
  if (msg.role !== 'system') addMsg(msg.role, msg.content);
});
btn.addEventListener('click', send);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
</script>

</body>
</html>
